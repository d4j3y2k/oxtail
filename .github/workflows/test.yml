name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 22+ required for `node --test` glob support (added 22.6.0).
          # The npm test script passes 'src/**/*.test.ts'; older Nodes
          # interpret it as a literal file path and fail. End-users don't
          # need 22 to run the published bin — engines stays at >=20.
          node-version: "22"
          cache: "npm"

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - run: npm ci

      # Dependency audit — informational, never blocks. oxtail's prod tree carries
      # the MCP SDK's HTTP-transport stack (express/hono/qs) that the stdio server
      # never loads, so a hard gate would red-CI on unreachable upstream advisories
      # and block unrelated PRs. This surfaces real issues in the run log so we stay
      # current (and bump within range) without alert-fatigue; tighten to a gate if
      # the prod tree ever stops carrying unreachable surface.
      - name: Dependency audit (informational)
        run: npm audit --omit=dev || true

      - run: npm test

  # Guard: any change to a shipped hook asset (assets/*.sh) must bump
  # HOOK_MARKER_VERSION, so upgraded installs are forced to re-run install-hook.
  # Runs only on PRs (needs a base ref to diff against).
  hook-version-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure hook asset changes bump HOOK_MARKER_VERSION
        run: node scripts/check-hook-version.mjs "${{ github.event.pull_request.base.sha }}"
